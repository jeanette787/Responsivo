<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Responsivo Colorido</title>
    <style>
        /* Estilos base */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #f9a5ff; /* Naranja vibrante */
            color: rgb(0, 0, 0);
            padding: 20px;
            text-align: center;
        }

        /* Contenedor principal con Flexbox */
        .container {
            display: flex;
            flex: 1;
            flex-wrap: wrap; /* Permite que los elementos bajen de línea */
        }

        /* Secciones con colores diversos */
        .barramenu {
            background-color: #9eeefc; /* Verde lima */
            flex: 1;
            min-width: 200px;
            padding: 20px;
        }

        .principal {
            background-color: #f3eaae; /* Azul intenso */
            color: rgb(0, 0, 0);
            flex: 3;
            min-width: 300px;
            padding: 20px;
        }

        .infoextra {
            background-color: #ccf692; /* Magenta */
            flex: 1;
            min-width: 200px;
            padding: 20px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* Media Query para pantallas pequeñas */
        @media (max-width: 600px) {
            .container {
                flex-direction: column; /* Apila los divs verticalmente */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Mi Sitio Web Responsivo</h1>
    </header>

    <div class="container">
        <div class="barramenu">
            <h3>Menú</h3>
            <p>Este es el lateral verde.</p>
        </div>
        
        <div class="principal">
            <h2>Contenido Principal</h2>
            <p>Yo soy el área azul. En pantallas grandes soy ancho, en móviles me estiro.</p>
        </div>

        <div class="infoextra">
            <h3>Info Extra</h3>
            <p>Un toque de magenta para variar.</p>
        </div>
    </div>

    <footer>
        <p>&copy;JEANETE COUOH & CLARA MIAM - M&eacute;rida, Yucat&aacute;n 2026</p>
    </footer>

</body>
</html>
